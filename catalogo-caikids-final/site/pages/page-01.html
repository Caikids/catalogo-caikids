<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Montserrat:wght@400;500;600;700;800&display=swap');
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ width:1600px; height:900px; overflow:hidden; }
  body{ font-family:'Montserrat', sans-serif; }

  .page{
    width:1600px; height:900px;
    position:relative;
    background:#f1ead9;
    overflow:hidden;
  }

  .photo-side{
    position:absolute;
    top:0; right:0; bottom:0;
    width:32%;
    background: linear-gradient(160deg, #a8b188 0%, #959f71 45%, #777f5e 100%);
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .photo-side img{
    height:880px;
    filter: drop-shadow(0 25px 30px rgba(0,0,0,0.4));
  }
  .photo-side .photo-placeholder{
    width:70%;
    height:70%;
    margin-bottom:60px;
    border:1.6px dashed rgba(241,234,217,0.5);
    border-radius:16px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:16px;
  }
  .photo-side .ph-icon svg{ width:120px; height:120px; }
  .photo-side .ph-label{
    font-size:13px;
    font-weight:800;
    letter-spacing:1.5px;
    color:#e8e2cd;
    text-align:center;
    line-height:1.5;
  }
  .photo-side .ph-sub{
    font-size:11px;
    font-weight:600;
    letter-spacing:1px;
    color:#a8a488;
    text-align:center;
  }

  .accent-dot{
    position:absolute;
    top:86px; left:90px;
    width:20px; height:20px;
    border-radius:50%;
    background:#5c6440;
  }

  .badge{
    position:absolute;
    top:210px; left:90px;
  }
  .badge img{ height:90px; width:auto; }

  .textblock{
    position:absolute;
    left:90px; top:320px;
    width:600px;
    z-index:5;
  }

  .eyebrow{
    font-size:14px;
    font-weight:700;
    letter-spacing:5px;
    color:#5c6440;
    margin-bottom:18px;
  }

  h1{
    font-family:'Playfair Display', serif;
    font-weight:700;
    font-size:84px;
    line-height:1.05;
    color:#17170f;
  }

  h1 .title-sub{
    display:block;
    font-family:'Montserrat', sans-serif;
    font-weight:700;
    font-size:22px;
    letter-spacing:6px;
    color:#5c6440;
    margin-top:12px;
  }

  .desc{
    margin-top:30px;
    font-size:16px;
    font-weight:500;
    color:#4a4636;
    max-width:420px;
    line-height:1.6;
  }

  .chiplist{
    margin-top:36px;
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    max-width:440px;
  }
  .chip{
    border:1.3px solid #c9c2a8;
    border-radius:30px;
    padding:9px 20px;
    font-size:11.5px;
    font-weight:700;
    letter-spacing:1px;
    color:#454b30;
  }

  .footer{
    position:absolute;
    bottom:60px; left:90px;
    display:flex;
    align-items:center;
    gap:16px;
  }
  .footer .line{ width:60px; height:1.5px; background:#454b30; }
  .footer .txt{ font-size:12px; font-weight:700; letter-spacing:2px; color:#454b30; }
</style>
</head>
