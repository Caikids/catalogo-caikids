<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo Caikids 2026</title>
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  html, body{
    width:100%; height:100%;
    background:#0e0e0a;
    overflow:hidden;
    font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  .viewer-wrap{
    position:fixed;
    top:0; left:0; right:0; bottom:56px;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }

  .stage{
    position:relative;
    width:1600px;
    height:900px;
    flex-shrink:0;
    background:#f6f2e8;
    box-shadow:0 0 80px rgba(0,0,0,0.6);
    transform-origin:center center;
  }

  iframe{
    width:1600px;
    height:900px;
    border:none;
    display:block;
    background:#f6f2e8;
  }

  .side-fade{ display:none; }

  /* controls */
  .nav-btn{
    position:fixed;
    top:50%;
    transform:translateY(-50%);
    width:56px; height:56px;
    border-radius:50%;
    background:rgba(255,255,255,0.08);
    border:1.5px solid rgba(255,255,255,0.25);
    color:#f1ead9;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    z-index:10;
    transition:background 0.2s ease, transform 0.15s ease;
    backdrop-filter: blur(4px);
  }
  .nav-btn:hover{ background:rgba(255,255,255,0.18); }
  .nav-btn:active{ transform:translateY(-50%) scale(0.94); }
  .nav-btn svg{ width:22px; height:22px; }
  .nav-btn.prev{ left:24px; }
  .nav-btn.next{ right:24px; }
  .nav-btn.disabled{ opacity:0.25; pointer-events:none; }

  .bottom-bar{
    position:fixed;
    bottom:0; left:0; right:0;
    height:56px;
    background:rgba(14,14,10,0.92);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 24px;
    z-index:10;
    backdrop-filter: blur(6px);
  }

  .page-counter{
    color:#c9c2a8;
    font-size:14px;
    font-weight:600;
    letter-spacing:1px;
    min-width:70px;
  }

  .progress-track{
    position:absolute;
    top:0; left:0; right:0;
    height:3px;
    background:rgba(255,255,255,0.08);
  }
  .progress-fill{
    height:100%;
    background:#c9a24a;
    transition:width 0.25s ease;
  }

  .brand-mini{
    display:flex;
    align-items:center;
    gap:10px;
    color:#c9c2a8;
    font-size:12px;
    font-weight:700;
    letter-spacing:2px;
  }
  .brand-mini img{ width:20px; height:20px; opacity:0.85; }

  .thumb-toggle{
    color:#c9c2a8;
    font-size:12px;
    font-weight:700;
    letter-spacing:1.5px;
    cursor:pointer;
    border:1px solid rgba(255,255,255,0.25);
    border-radius:20px;
    padding:7px 16px;
    background:transparent;
  }
  .thumb-toggle:hover{ background:rgba(255,255,255,0.08); }

  /* thumbnail strip */
  .thumb-strip{
    position:fixed;
    bottom:56px; left:0; right:0;
    background:rgba(14,14,10,0.95);
    display:flex;
    gap:12px;
    padding:16px 24px;
    overflow-x:auto;
    z-index:9;
    transform:translateY(110%);
    transition:transform 0.25s ease;
  }
  .thumb-strip.open{ transform:translateY(0); }
  .thumb-item{
    flex:0 0 auto;
    width:110px; height:62px;
    border-radius:6px;
    border:2px solid transparent;
    background:#3a3a2c;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#c9c2a8;
    font-size:11px;
    font-weight:700;
    cursor:pointer;
    transition:border-color 0.15s ease;
  }
  .thumb-item.active{ border-color:#c9a24a; color:#f1ead9; }
  .thumb-item:hover{ border-color:rgba(201,162,74,0.6); }

  @media (max-width:768px){
    .side-fade{ display:none; }
    .nav-btn{ width:44px; height:44px; }
    .nav-btn.prev{ left:10px; }
    .nav-btn.next{ right:10px; }
    .bottom-bar{ padding:0 14px; }
    .brand-mini span.full{ display:none; }
  }
</style>
</head>
<body>

<div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>

<div class="side-fade left"></div>
<div class="side-fade right"></div>

<div class="viewer-wrap">
  <div class="stage">
    <iframe id="pageFrame" src="pages/page-00.html" title="Catálogo Caikids"></iframe>
  </div>
</div>

<button class="nav-btn prev" id="btnPrev" aria-label="Página anterior">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
</button>
<button class="nav-btn next" id="btnNext" aria-label="Próxima página">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
</button>

<div class="thumb-strip" id="thumbStrip"></div>

<div class="bottom-bar">
  <div class="brand-mini">
    <span class="full">CAIKIDS · CATÁLOGO 2026</span>
  </div>
  <div class="page-counter" id="pageCounter">1 / 14</div>
  <button class="thumb-toggle" id="thumbToggle">PÁGINAS</button>
</div>

<script>
  const TOTAL_PAGES = 21;
  const labels = [
    'Capa',
    'Meninos · Blusa Moletom', 'Blusa Moletom (ficha)',
    'Meninos · Calça', 'Calça (ficha)',
    'Meninos · Camisetas', 'Camisetas (ficha)',
    'Meninos · Bermudas', 'Bermudas (ficha)',
    'Meninas · Blusa Moletom', 'Blusa Moletom (ficha)',
    'Meninas · Calça', 'Calça (ficha)',
    'Adulto · Blusa Moletom', 'Blusa Moletom (ficha)',
    'Adulto · Calça', 'Calça (ficha)',
    'Adulto · Camiseta', 'Camiseta (ficha)',
    'Adulto · Bermuda', 'Bermuda (ficha)'
  ];

  let current = 0;
  const frame = document.getElementById('pageFrame');
  const counter = document.getElementById('pageCounter');
  const progressFill = document.getElementById('progressFill');
  const btnPrev = document.getElementById('btnPrev');
  const btnNext = document.getElementById('btnNext');
  const thumbStrip = document.getElementById('thumbStrip');
  const thumbToggle = document.getElementById('thumbToggle');

  function pad(n){ return n < 10 ? '0' + n : '' + n; }

  function goTo(index){
    if(index < 0 || index >= TOTAL_PAGES) return;
    current = index;
    frame.src = 'pages/page-' + pad(current) + '.html';
    counter.textContent = (current + 1) + ' / ' + TOTAL_PAGES;
    progressFill.style.width = ((current + 1) / TOTAL_PAGES * 100) + '%';
    btnPrev.classList.toggle('disabled', current === 0);
    btnNext.classList.toggle('disabled', current === TOTAL_PAGES - 1);
    document.querySelectorAll('.thumb-item').forEach((el, i) => {
      el.classList.toggle('active', i === current);
    });
  }

  btnPrev.addEventListener('click', () => goTo(current - 1));
  btnNext.addEventListener('click', () => goTo(current + 1));

  document.addEventListener('keydown', (e) => {
    if(e.key === 'ArrowRight') goTo(current + 1);
    if(e.key === 'ArrowLeft') goTo(current - 1);
    if(e.key === 'Escape') thumbStrip.classList.remove('open');
  });

  // build thumbnail strip
  labels.forEach((label, i) => {
    const el = document.createElement('div');
    el.className = 'thumb-item' + (i === 0 ? ' active' : '');
    el.textContent = (i + 1) + '. ' + label;
    el.addEventListener('click', () => { goTo(i); thumbStrip.classList.remove('open'); });
    thumbStrip.appendChild(el);
  });

  thumbToggle.addEventListener('click', () => {
    thumbStrip.classList.toggle('open');
  });

  // swipe support
  let touchStartX = 0;
  document.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; }, {passive:true});
  document.addEventListener('touchend', (e) => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if(Math.abs(dx) > 50){
      if(dx < 0) goTo(current + 1);
      else goTo(current - 1);
    }
  }, {passive:true});

  goTo(0);

  // scale the fixed 1600x900 stage to fit any screen size, centered
  const stage = document.querySelector('.stage');
  function updateScale(){
    const availW = window.innerWidth;
    const availH = window.innerHeight - 56; // leave room for bottom bar
    const scale = Math.min(availW / 1600, availH / 900);
    stage.style.transform = 'scale(' + scale + ')';
  }
  window.addEventListener('resize', updateScale);
  updateScale();

  // listen for direct navigation requests from the cover page menu (iframe)
  window.addEventListener('message', function(e){
    if(e.data && e.data.type === 'caikids-goto' && typeof e.data.page === 'number'){
      goTo(e.data.page);
    }
  });


</script>

</body>
</html>
