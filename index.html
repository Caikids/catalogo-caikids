<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo Caikids 2026</title>
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  html, body{
    width:100%; height:100%;
    background:#0e0e0a;
    overflow:hidden;
    font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  .viewer-wrap{
    position:fixed;
    top:0; left:0; right:0; bottom:56px;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:auto;
    -webkit-overflow-scrolling:touch;
  }

  .stage-outer{
    position:relative;
    flex-shrink:0;
    margin:auto;
  }

  .stage{
    position:absolute;
    top:0; left:0;
    width:1600px;
    height:900px;
    background:#f6f2e8;
    box-shadow:0 0 80px rgba(0,0,0,0.6);
    transform-origin:top left;
  }

  iframe{
    width:1600px;
    height:900px;
    border:none;
    display:block;
    background:#f6f2e8;
  }

  .side-fade{ display:none; }

  /* controls */
  .nav-btn{
    position:fixed;
    top:50%;
    transform:translateY(-50%);
    width:56px; height:56px;
    border-radius:50%;
    background:rgba(255,255,255,0.08);
    border:1.5px solid rgba(255,255,255,0.25);
    color:#f1ead9;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    z-index:10;
    transition:background 0.2s ease, transform 0.15s ease;
    backdrop-filter: blur(4px);
  }
  .nav-btn:hover{ background:rgba(255,255,255,0.18); }
  .nav-btn:active{ transform:translateY(-50%) scale(0.94); }
  .nav-btn svg{ width:22px; height:22px; }
  .nav-btn.prev{ left:24px; }
  .nav-btn.next{ right:24px; }
  .nav-btn.disabled{ opacity:0.25; pointer-events:none; }

  .bottom-bar{
    position:fixed;
    bottom:0; left:0; right:0;
    height:56px;
    background:rgba(14,14,10,0.92);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 24px;
    z-index:10;
    backdrop-filter: blur(6px);
  }

  .page-counter{
    color:#c9c2a8;
    font-size:14px;
    font-weight:600;
    letter-spacing:1px;
    min-width:70px;
  }

  .progress-track{
    position:absolute;
    top:0; left:0; right:0;
    height:3px;
    background:rgba(255,255,255,0.08);
  }
  .progress-fill{
    height:100%;
    background:#c9a24a;
    transition:width 0.25s ease;
  }

  .brand-mini{
    display:flex;
    align-items:center;
    gap:10px;
    color:#c9c2a8;
    font-size:12px;
    font-weight:700;
    letter-spacing:2px;
  }
  .brand-mini img{ width:20px; height:20px; opacity:0.85; }

  .thumb-toggle{
    color:#c9c2a8;
    font-size:12px;
    font-weight:700;
    letter-spacing:1.5px;
    cursor:pointer;
    border:1px solid rgba(255,255,255,0.25);
    border-radius:20px;
    padding:7px 16px;
    background:transparent;
  }
  .thumb-toggle:hover{ background:rgba(255,255,255,0.08); }

  /* thumbnail strip */
  .thumb-strip{
    position:fixed;
    bottom:56px; left:0; right:0;
    background:rgba(14,14,10,0.95);
    display:flex;
    gap:12px;
    padding:16px 24px;
    overflow-x:auto;
    z-index:9;
    transform:translateY(110%);
    transition:transform 0.25s ease;
  }
  .thumb-strip.open{ transform:translateY(0); }
  .thumb-item{
    flex:0 0 auto;
    width:110px; height:62px;
    border-radius:6px;
    border:2px solid transparent;
    background:#3a3a2c;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#c9c2a8;
    font-size:11px;
    font-weight:700;
    cursor:pointer;
    transition:border-color 0.15s ease;
  }
  .thumb-item.active{ border-color:#c9a24a; color:#f1ead9; }
  .thumb-item:hover{ border-color:rgba(201,162,74,0.6); }

  @media (max-width:768px){
    .side-fade{ display:none; }
    .nav-btn{ width:44px; height:44px; }
    .nav-btn.prev{ left:10px; }
    .nav-btn.next{ right:10px; }
    .bottom-bar{ padding:0 14px; }
