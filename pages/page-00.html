<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Montserrat:wght@400;500;600;700;800&display=swap');
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ width:1600px; height:900px; overflow:hidden; }
  body{ font-family:'Montserrat', sans-serif; }

  .page{
    width:1600px; height:900px;
    position:relative;
    background: #8a9468;
    overflow:hidden;
  }

  .pattern{
    position:absolute; inset:0;
    background-image: url("data:image/png;base64,__WATERMARK_PADDED_B64__");
    background-size: 110px 110px;
    background-repeat:repeat;
    opacity:0.16;
  }

  .top-row{
    position:absolute;
    top:56px; left:50%;
    transform:translateX(-50%);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:16px;
    z-index:5;
  }
  .top-row img{ width:130px; height:130px; }
  .top-row .txt{ color:#f1ead9; font-size:12px; font-weight:700; letter-spacing:4px; }

  .titleblock{
    position:absolute;
    top:250px; left:50%;
    transform:translateX(-50%);
    z-index:5;
    text-align:center;
  }

  .pill{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    border:1.5px solid rgba(241,234,217,0.55);
    border-radius:40px;
    padding:9px 24px;
    color:#f1ead9;
    font-size:13px;
    font-weight:700;
    letter-spacing:3px;
  }

  .title-row{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:36px;
    margin-top:20px;
  }

  h1{
    font-family:'Playfair Display', serif;
    font-weight:600;
    font-size:104px;
    line-height:1;
    color:#f6f2e8;
    letter-spacing:2px;
  }

  .sub{
    margin:20px auto 0 auto;
    color:#eae4d2;
    font-size:15px;
    font-weight:500;
    letter-spacing:2px;
    max-width:600px;
  }

  /* navigation menu */
  .nav-menu{
    position:absolute;
    top:490px; left:50%;
    transform:translateX(-50%);
    z-index:6;
    display:flex;
    gap:64px;
  }

  .nav-category{
    display:flex;
    flex-direction:column;
    align-items:center;
    width:220px;
  }

  .cat-btn{
    width:100%;
    background:rgba(241,234,217,0.12);
    border:1.5px solid rgba(241,234,217,0.55);
    border-radius:40px;
    padding:16px 0;
    color:#f6f2e8;
    font-family:'Montserrat', sans-serif;
    font-size:15px;
    font-weight:700;
    letter-spacing:3px;
    cursor:pointer;
    transition:background 0.2s ease, border-color 0.2s ease;
  }
  .cat-btn:hover{ background:rgba(241,234,217,0.2); }
  .nav-category.open .cat-btn{
    background:#f6f2e8;
    color:#454b30;
    border-color:#f6f2e8;
  }

  .subcat-list{
    display:none;
    flex-direction:column;
    gap:10px;
    width:100%;
    margin-top:16px;
  }
  .nav-category.open .subcat-list{ display:flex; }

  .subcat-btn{
    width:100%;
    background:transparent;
    border:1px solid rgba(241,234,217,0.4);
    border-radius:30px;
    padding:11px 0;
    color:#f1ead9;
    font-family:'Montserrat', sans-serif;
    font-size:12px;
    font-weight:600;
    letter-spacing:1.5px;
    cursor:pointer;
    transition:background 0.15s ease, border-color 0.15s ease;
  }
  .subcat-btn:hover{
    background:rgba(241,234,217,0.15);
    border-color:#f1ead9;
  }

  .footer-line{
    position:absolute;
    bottom:36px; left:50%;
    transform:translateX(-50%);
    display:flex;
    align-items:center;
    gap:18px;
  }
  .footer-line .line{ width:70px; height:1.5px; background:rgba(241,234,217,0.5); }
  .footer-line .txt{ color:#e5dfc9; font-size:12px; font-weight:700; letter-spacing:3px; }

  @media (max-width:700px){
    html,body{ width:100%; height:auto; min-height:100vh; overflow-x:hidden; overflow-y:auto; }
    .page{ width:100%; height:auto; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:48px 24px 56px; }
    .top-row{ position:static; transform:none; margin:0; }
    .top-row img{ width:96px; height:96px; }
    .titleblock{ position:static; transform:none; margin-top:24px; text-align:center; }
    h1{ font-size:58px; }
    .sub{ max-width:280px; }
    .nav-menu{ position:static; transform:none; flex-direction:column; gap:16px; width:100%; max-width:340px; margin-top:36px; }
    .nav-category{ width:100%; }
    .footer-line{ position:static; transform:none; margin-top:40px; }
  }
</style>
</head>
